
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentions légales | ENVIE CONTENT STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry: #3D0C11;
            --cream: #FFFCF9;
            --rust: #A44A3F;
        }
        body { 
            font-family: 'Barlow Condensed', sans-serif;
            background-color: var(--cream);
            color: var(--cherry);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            text-decoration: none;
            color: var(--rust);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 40px;
            line-height: 1.1;
        }
        section {
            margin-bottom: 60px;
        }
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--rust);
            margin-bottom: 16px;
            display: block;
        }
        p {
            font-size: 18px;
            color: var(--cherry);
            opacity: 0.7;
            margin-bottom: 24px;
        }
        .email {
            word-break: break-all;
        }
        @media (max-width: 640px) {
            h1 { font-size: 32px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Retour au site</a>
        <h1>Mentions légales</h1>
        
        <section>
            <div class="brand">ENVIE CONTENT STUDIO</div>
            <p>Statut : Auto-entrepreneur<br>
            Responsable de publication : Fleur Faure<br>
            Email : <span class="email">contact@enviecontentstudio.com</span></p>
        </section>

        <section>
            <span class="label">Hébergement</span>
            <div class="brand">OVH</div>
            <p>2 rue Kellermann<br>
            59100 Roubaix – France</p>
        </section>
    </div>
</body>
</html>
